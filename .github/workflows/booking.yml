# Mixers Booking Script - GitHub Actions Scheduler
# This replaces scheduler.js when running in the cloud.
# Each run does a single check (equivalent to `npm run check`).
#
# PRIMARY TRIGGER: External cron service (cron-job.org) → workflow_dispatch
#   - GitHub's built-in cron is unreliable (delays of 30min–2hrs are common)
#   - An external service calls the GitHub API every 5 minutes for reliable scheduling
#   - See docs/GITHUB_ACTIONS_SETUP.md for setup instructions
#
# SETUP: Add your secrets in GitHub repo → Settings → Secrets and variables → Actions
# See docs/GITHUB_ACTIONS_SETUP.md for detailed instructions.

name: Mixer Booking Check

on:
  # Fallback cron trigger - runs every 2 hours as a safety net
  # GitHub's built-in cron is NOT reliable for short intervals (delays of 30min–2hrs).
  # This exists only as a backup in case the external cron service (cron-job.org) goes down.
  # The primary trigger is workflow_dispatch, called by cron-job.org every 5 minutes.
  schedule:
    - cron: '0 */2 * * *'

  # Primary trigger - called by external cron service (cron-job.org) every 5 minutes
  # Can also be triggered manually from the Actions tab
  workflow_dispatch:

# Prevent multiple runs from overlapping (same as the isRunning guard in scheduler.js)
concurrency:
  group: booking-check
  cancel-in-progress: false

jobs:
  check-and-book:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run booking check
        env:
          # ── Required secrets ──
          CR_EMAIL: ${{ secrets.CR_EMAIL }}
          CR_PASSWORD: ${{ secrets.CR_PASSWORD }}

          # ── Optional: Push notifications (ntfy.sh) ──
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ vars.NTFY_SERVER || '' }}
          NOTIFY_NO_SPOTS: ${{ vars.NOTIFY_NO_SPOTS || '' }}

          # ── Optional: Email notifications ──
          NOTIFY_EMAIL_USER: ${{ secrets.NOTIFY_EMAIL_USER }}
          NOTIFY_EMAIL_PASS: ${{ secrets.NOTIFY_EMAIL_PASS }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}

          # ── Optional: Override defaults (set as secrets or repo variables) ──
          ORG_ID: ${{ vars.ORG_ID || '' }}
          USER_ID: ${{ vars.USER_ID || '' }}
          MEMBERSHIP_ID: ${{ vars.MEMBERSHIP_ID || '' }}
          EVENT_CONFIGS: ${{ vars.EVENT_CONFIGS || '' }}
          MAX_WEEKS_AHEAD: ${{ vars.MAX_WEEKS_AHEAD || '' }}
          BOOKING_AFTER_DATE: ${{ vars.BOOKING_AFTER_DATE || '' }}

          # ── CI-specific settings ──
          HEADLESS: 'true'
          ENABLE_NOTIFICATIONS: 'true'
        run: node src/booking.js

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_number }}
          path: output/*.png
          retention-days: 3
          if-no-files-found: ignore
